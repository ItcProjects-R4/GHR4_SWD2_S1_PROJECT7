<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Counter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="counter-card">
      <h1>Animated Counter</h1>
      <div class="display" id="value">0</div>
      <div class="buttons">
        <button id="decrement" class="btn minus">&#8722;</button>
        <button id="reset" class="btn reset">&#x21bb;</button>
        <button id="increment" class="btn plus">+</button>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
